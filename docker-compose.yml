version: '3.9'

services:

  # ── PostgreSQL — opcional pero usado por el stack completo ───
  db:
    image: postgres:16-alpine
    container_name: nova_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nova}
      POSTGRES_USER: ${POSTGRES_USER:-nova}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nova_secret_2026}
    volumes:
      - nova_db_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nova"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Backend API — runtime modular de Nova ─────────────────────
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: nova_api
    restart: unless-stopped
    environment:
      NOVA_DB_URL: ${NOVA_DB_URL:-postgresql+asyncpg://nova:nova_secret_2026@db:5432/nova}
      DATABASE_URL: ${DATABASE_URL:-postgresql://nova:nova_secret_2026@db:5432/nova}
      NOVA_JWT_SECRET: ${NOVA_JWT_SECRET:-nova_signing_key_local_dev_only}
      SECRET_KEY: ${SECRET_KEY:-nova_signing_key_local_dev_only}
      WORKSPACE_ADMIN_TOKEN: ${WORKSPACE_ADMIN_TOKEN:-nova_admin_token_local_dev_only}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3005}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3005,http://127.0.0.1:3005,http://localhost:5173,http://127.0.0.1:5173}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-nova_session}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-8}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI:-}
      GITHUB_SCOPE: ${GITHUB_SCOPE:-read:user user:email}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      COHERE_API_KEY: ${COHERE_API_KEY:-}
      NOVA_API_PORT: 8000
      NOVA_LOG_FORMAT: console
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./:/app
    command: python3 nova.py serve --host 0.0.0.0 --port 8000

  # ── Frontend — build reproducible del dashboard moderno ───────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nova_frontend
    restart: unless-stopped
    ports:
      - "3005:80"
    depends_on:
      - api

volumes:
  nova_db_data:
